<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — NexaCore CRM</title>
  <meta name="description" content="Acesse o NexaCore CRM Intelligence">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-4);
    }
    .auth-card {
      width: 100%;
      max-width: 420px;
      background: var(--bg-surface);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius-xl);
      padding: var(--space-8);
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .auth-header {
      text-align: center;
      margin-bottom: var(--space-8);
    }
    .auth-logo {
      width: 64px;
      height: 64px;
      border-radius: var(--radius-lg);
      background: var(--gradient-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--text-2xl);
      font-weight: 700;
      color: white;
      margin: 0 auto var(--space-4);
    }
    .auth-title {
      font-size: var(--text-2xl);
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: var(--space-2);
    }
    .auth-subtitle {
      color: var(--text-secondary);
      font-size: var(--text-base);
    }
    .auth-form {
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }
    .form-label {
      font-size: var(--text-sm);
      font-weight: 500;
      color: var(--text-secondary);
    }
    .form-control {
      padding: var(--space-3) var(--space-4);
      border-radius: var(--radius-md);
      border: 1px solid rgba(255,255,255,0.1);
      background: var(--bg-elevated);
      color: var(--text-primary);
      font-size: var(--text-base);
      transition: all var(--transition-fast);
    }
    .form-control:focus {
      outline: none;
      border-color: var(--primary-400);
      box-shadow: 0 0 0 3px var(--primary-glow);
    }
    .form-control::placeholder {
      color: var(--text-tertiary);
    }
    .btn-auth {
      width: 100%;
      padding: var(--space-3) var(--space-6);
      font-size: var(--text-base);
      font-weight: 600;
      margin-top: var(--space-2);
    }
    .auth-divider {
      display: flex;
      align-items: center;
      gap: var(--space-4);
      margin: var(--space-4) 0;
      color: var(--text-tertiary);
      font-size: var(--text-sm);
    }
    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.1);
    }
    .auth-footer {
      text-align: center;
      margin-top: var(--space-6);
      color: var(--text-secondary);
      font-size: var(--text-sm);
    }
    .auth-footer a {
      color: var(--primary-400);
      text-decoration: none;
      font-weight: 500;
    }
    .auth-footer a:hover {
      text-decoration: underline;
    }
    .error-toast {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
      padding: var(--space-3);
      border-radius: var(--radius-md);
      font-size: var(--text-sm);
      display: none;
      align-items: center;
      gap: var(--space-2);
    }
    .error-toast.visible {
      display: flex;
    }
    .btn-ghost-link {
      background: none;
      border: none;
      color: var(--primary-400);
      font-weight: 500;
      cursor: pointer;
      padding: 0;
      font-size: inherit;
    }
    .btn-ghost-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="bg-ambient"></div>
  
  <div class="auth-container">
    <div class="auth-card glass-card">
      <div class="auth-header">
        <div class="auth-logo" id="authLogo">N</div>
        <h1 class="auth-title" id="authTitle">Bem-vindo ao NexaCore</h1>
        <p class="auth-subtitle" id="authSubtitle">Faça login para acessar sua CRM Intelligence</p>
      </div>

      <div class="error-toast" id="errorToast">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
        <span id="errorMessage"></span>
      </div>

      <form class="auth-form" id="loginForm">
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input type="email" id="email" class="form-control glass-input" placeholder="seu@email.com" autocomplete="email" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Senha</label>
          <input type="password" id="password" class="form-control glass-input" placeholder="••••••••" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-auth">Entrar</button>
      </form>

      <div class="auth-divider">ou</div>

      <form class="auth-form" id="registerForm" style="display:none">
        <div class="form-group">
          <label class="form-label" for="regName">Nome Completo</label>
          <input type="text" id="regName" class="form-control glass-input" placeholder="João Silva" autocomplete="name" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="regEmail">Email</label>
          <input type="email" id="regEmail" class="form-control glass-input" placeholder="seu@email.com" autocomplete="email" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="regPassword">Senha</label>
          <input type="password" id="regPassword" class="form-control glass-input" placeholder="Mínimo 6 caracteres" autocomplete="new-password" required minlength="6">
        </div>
        <div class="form-group">
          <label class="form-label" for="regRole">Função</label>
          <select id="regRole" class="form-control glass-select">
            <option value="agent">Agente de Vendas</option>
            <option value="admin">Administrador</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary btn-auth">Criar Conta</button>
      </form>

      <div class="auth-footer">
        <span id="switchText">Não tem conta? </span>
        <button type="button" class="btn-ghost-link" id="switchBtn">Cadastre-se</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script src="js/brand-config.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      BrandConfig.load();
      BrandConfig.applyCSS();
      document.getElementById('authLogo').textContent = BrandConfig.logoLetter;
      document.getElementById('authTitle').textContent = BrandConfig.name;
      document.getElementById('authSubtitle').textContent = `Faça login no ${BrandConfig.company}`;

      const loginForm = document.getElementById('loginForm');
      const registerForm = document.getElementById('registerForm');
      const switchBtn = document.getElementById('switchBtn');
      const switchText = document.getElementById('switchText');
      const errorToast = document.getElementById('errorToast');
      const errorMessage = document.getElementById('errorMessage');

      let isRegister = false;

      function showError(msg) {
        errorMessage.textContent = msg;
        errorToast.classList.add('visible');
        setTimeout(() => errorToast.classList.remove('visible'), 5000);
      }

      function switchMode() {
        isRegister = !isRegister;
        loginForm.style.display = isRegister ? 'none' : 'block';
        registerForm.style.display = isRegister ? 'block' : 'none';
        switchText.innerHTML = isRegister 
          ? 'Já tem conta? <button type="button" class="btn-ghost-link" id="switchBtn">Entrar</button>'
          : 'Não tem conta? <button type="button" class="btn-ghost-link" id="switchBtn">Cadastre-se</button>';
        document.getElementById('switchBtn').addEventListener('click', switchMode);
        errorToast.classList.remove('visible');
      }

      switchBtn.addEventListener('click', switchMode);

      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = loginForm.querySelector('button[type="submit"]');
        const originalText = btn.textContent;
        btn.textContent = 'Entrando...';
        btn.disabled = true;

        try {
          await NexaAuth.signIn(
            document.getElementById('email').value,
            document.getElementById('password').value
          );
          window.location.href = 'index.html';
        } catch (err) {
          showError(err.message || 'Erro ao fazer login');
        } finally {
          btn.textContent = originalText;
          btn.disabled = false;
        }
      });

      registerForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = registerForm.querySelector('button[type="submit"]');
        const originalText = btn.textContent;
        btn.textContent = 'Criando...';
        btn.disabled = true;

        try {
          await NexaAuth.signUp(
            document.getElementById('regEmail').value,
            document.getElementById('regPassword').value,
            {
              name: document.getElementById('regName').value,
              role: document.getElementById('regRole').value,
              email: document.getElementById('regEmail').value
            }
          );
          showError('Conta criada! Verifique seu email para confirmar.');
          setTimeout(() => switchMode(), 2000);
        } catch (err) {
          showError(err.message || 'Erro ao criar conta');
        } finally {
          btn.textContent = originalText;
          btn.disabled = false;
        }
      });
    });
  </script>
</body>
</html>
