<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics & IA — CRM Intelligence</title>
  <meta name="description" content="Análise de dados e Inteligência Artificial">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/analytics.css">
</head>
<body>
  <div class="bg-ambient"></div>
  <div class="app-layout">
    <aside class="sidebar"></aside>
    <main class="main-content">
      <header class="header">
        <div class="header-left">
          <button class="btn-icon btn-ghost mobile-menu-btn" style="display:none">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <div>
            <h1 class="header-title">Analytics & IA</h1>
            <p class="header-subtitle">Insights e métricas avançadas impulsionadas por IA</p>
          </div>
        </div>
        <div class="header-right">
          <div class="search-bar">
            <span class="search-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
            <input type="text" placeholder="Buscar..." id="globalSearch">
          </div>
          <button class="btn-icon btn-ghost notification-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            <span class="notification-dot"></span>
          </button>
        </div>
      </header>
      <div class="page-content animate-fade-in-up">
        
        <!-- Top Metrics -->
        <div class="metrics-grid stagger-1" id="topMetricsContainer">
          <!-- Metrics will be injected here -->
        </div>

        <div class="analytics-layout">
            <!-- Charts Area -->
            <div class="charts-area">
                <div class="charts-row stagger-2">
                    <div class="glass-card chart-card">
                        <div class="chart-header">
                            <h3>Receita por Mês</h3>
                        </div>
                        <div class="chart-wrapper">
                            <canvas id="revenueChart"></canvas>
                        </div>
                    </div>
                    <div class="glass-card chart-card">
                        <div class="chart-header">
                            <h3>Conversas por Dia</h3>
                        </div>
                        <div class="chart-wrapper">
                            <canvas id="conversationsChart"></canvas>
                        </div>
                    </div>
                </div>

                <div class="charts-row stagger-3">
                    <div class="glass-card chart-card">
                        <div class="chart-header">
                            <h3>Distribuição de Sentimento</h3>
                        </div>
                        <div class="sentiment-container">
                            <div class="chart-wrapper pie-wrapper">
                                <canvas id="sentimentChart"></canvas>
                            </div>
                            <div id="sentimentLegend" class="chart-legend"></div>
                        </div>
                    </div>
                    <div class="glass-card chart-card">
                        <div class="chart-header">
                            <h3>Comparação de Plataformas</h3>
                        </div>
                        <div class="platform-comparison">
                            <div class="platform-stat">
                                <div class="platform-label">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--whatsapp)" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                                    <span>WhatsApp</span>
                                </div>
                                <div class="platform-bar-container">
                                    <div class="platform-bar whatsapp-bar" id="whatsappBar"></div>
                                </div>
                                <span class="platform-value" id="whatsappValue">0%</span>
                            </div>
                            <div class="platform-stat">
                                <div class="platform-label">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--instagram)" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
                                    <span>Instagram</span>
                                </div>
                                <div class="platform-bar-container">
                                    <div class="platform-bar instagram-bar" id="instagramBar"></div>
                                </div>
                                <span class="platform-value" id="instagramValue">0%</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- AI Insights Sidebar -->
            <div class="insights-sidebar stagger-4">
                <div class="insights-header">
                    <h2><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--primary-400)" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg> AI Insights</h2>
                    <span class="badge badge-primary">Pulsing</span>
                </div>
                <div class="insights-list" id="insightsContainer">
                    <!-- Insights injected here -->
                </div>
            </div>
        </div>
      </div>
    </main>
  </div>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="js/data.js"></script>
  <script src="js/ai-engine.js"></script>
  <script src="js/brand-config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/analytics.js"></script>
  <script>document.addEventListener('DOMContentLoaded', () => { initNexaData().then(() => { NexaApp.init(); initAnalytics(); }); });</script>
</body>
</html>
