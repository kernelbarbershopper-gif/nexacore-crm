<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pipeline de Vendas — NexaCore CRM</title>
  <meta name="description" content="Gestão visual de oportunidades de vendas com inteligência artificial.">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pipeline.css">
</head>
<body>
  <div class="bg-ambient"></div>
  <div class="app-layout">
    <aside class="sidebar"></aside>
    <main class="main-content">
      <header class="header">
        <div class="header-left">
          <button class="btn-icon btn-ghost mobile-menu-btn" style="display:none">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <div>
            <h1 class="header-title">Pipeline de Vendas</h1>
            <p class="header-subtitle">Gestão inteligente de oportunidades</p>
          </div>
        </div>
        <div class="header-right">
          <div class="search-bar">
            <span class="search-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            </span>
            <input type="text" placeholder="Buscar..." id="globalSearch">
          </div>
          <button class="btn-icon btn-ghost notification-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            <span class="notification-dot"></span>
          </button>
        </div>
      </header>
      <div class="page-content">
        <div class="pipeline-container" id="pipelineBoard">
            <!-- Columns and Deals will be injected here by pipeline.js -->
        </div>
      </div>
    </main>
  </div>
  <script src="js/data.js"></script>
  <script src="js/ai-engine.js"></script>
  <script src="js/app.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/pipeline.js"></script>
</body>
</html>
