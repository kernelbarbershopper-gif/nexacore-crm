<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Central de Conversas — CRM Intelligence</title>
  <meta name="description" content="Central de atendimento unificado com inteligência artificial">
  <meta name="theme-color" content="#f59e0b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NexaCore CRM">
  <link rel="manifest" href="public/manifest.json">
  <link rel="apple-touch-icon" href="public/icons/icon-192.png">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/conversations.css">
</head>
<body>
  <div class="bg-ambient"></div>
  <div class="app-layout">
    <aside class="sidebar"></aside>
    <main class="main-content">
      <header class="header">
        <div class="header-left">
          <button class="btn-icon btn-ghost mobile-menu-btn" style="display:none">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <div>
            <h1 class="header-title">Central de Conversas</h1>
            <p class="header-subtitle">Atendimento unificado com inteligência artificial</p>
          </div>
        </div>
        <div class="header-right">
          <div class="search-bar">
            <span class="search-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
            <input type="text" placeholder="Buscar nas conversas..." id="globalSearch">
          </div>
          <button class="btn-icon btn-ghost notification-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            <span class="notification-dot"></span>
          </button>
        </div>
      </header>
      
      <div class="page-content">
        <div class="conversations-layout">
          <!-- Contact List Sidebar -->
          <div class="chat-sidebar glass-card">
            <div class="chat-sidebar-header">
              <h2>Mensagens</h2>
              <div class="chat-filters">
                <button class="btn-filter active">Todas</button>
                <button class="btn-filter">WhatsApp</button>
                <button class="btn-filter">Instagram</button>
              </div>
            </div>
            <div class="contact-list" id="contactList">
              <!-- JS will populate contacts -->
            </div>
          </div>
          
          <!-- Main Chat Area -->
          <div class="chat-main glass-card">
            <div class="chat-header" id="chatHeader">
               <!-- Contact info and active platform -->
            </div>
            <div class="chat-messages" id="chatMessages">
               <!-- Messages here -->
            </div>
            <div class="chat-input-area">
              <div class="ghost-writer-panel" id="ghostWriterPanel">
                <!-- AI suggestions -->
              </div>
              <div class="chat-input-wrapper">
                <button class="btn-icon btn-ghost"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg></button>
                <input type="text" placeholder="Digite uma mensagem ou use o Ghost Writer..." class="chat-input" id="chatInput">
                <button class="btn-icon btn-primary send-btn" id="sendBtn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
              </div>
            </div>
          </div>

          <!-- AI Context Sidebar -->
          <div class="ai-sidebar">
            <div class="glass-card ai-panel">
              <div class="panel-header">
                <h3><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--primary-400)" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg> DNA do Cliente</h3>
              </div>
              <div class="dna-profile" id="dnaProfile">
                <!-- JS populates -->
              </div>
            </div>
            
            <div class="glass-card ai-panel mt-4">
              <div class="panel-header">
                <h3><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--primary-400)" stroke-width="2"><path d="M2 12h4l2-9 5 18 3-9h6"/></svg> Radar de Emoção AI</h3>
              </div>
              <div class="emotion-radar-container">
                <canvas id="emotionRadarCanvas" width="220" height="220"></canvas>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
  
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="js/data.js"></script>
  <script src="js/ai-engine.js"></script>
  <script src="js/brand-config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/conversations.js"></script>
  <script>document.addEventListener('DOMContentLoaded', () => { initNexaData().then(() => { NexaApp.init(); initConversations(); }); });</script>
</body>
</html>
