<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Dashboard Principal — CRM Intelligence</title>
  <meta name="description" content="Dashboard principal com KPIs, Mapa Neural de Conversas e feed de atividades recentes.">
  <meta name="theme-color" content="#f59e0b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NexaCore CRM">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
  <div class="bg-ambient"></div>
  <div class="app-layout">
    <aside class="sidebar"></aside>
    <main class="main-content">
      <header class="header">
        <div class="header-left">
          <button class="btn-icon btn-ghost mobile-menu-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <div>
            <h1 class="header-title">Dashboard Principal</h1>
            <p class="header-subtitle">Visão geral e métricas de inteligência</p>
          </div>
        </div>
        <div class="header-right">
          <div class="search-bar">
            <span class="search-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
            <input type="text" placeholder="Buscar..." id="globalSearch">
          </div>
          <button class="btn-icon btn-ghost notification-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            <span class="notification-dot"></span>
          </button>
        </div>
      </header>
      <div class="page-content">
        <!-- KPI Row -->
        <div class="kpi-grid" id="kpiContainer">
          <!-- KPIs will be injected here via JS -->
        </div>

        <div class="dashboard-grid">
          <!-- Neural Conversation Map -->
          <div class="glass-card map-card animate-fade-in-up" style="animation-delay: 0.1s">
            <div class="card-header">
              <h2 class="card-title">Mapa Neural de Conversas</h2>
              <span class="badge badge-pulse">Ao vivo</span>
            </div>
            <div class="canvas-container">
              <canvas id="neuralMapCanvas"></canvas>
            </div>
          </div>

          <div class="side-widgets">
            <!-- Revenue Oracle -->
            <div class="glass-card oracle-card animate-fade-in-up" style="animation-delay: 0.2s">
              <div class="card-header">
                <h2 class="card-title">Oráculo de Receita</h2>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--primary-500)" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
              </div>
              <div class="oracle-content">
                <p class="oracle-label">Receita Prevista (30 dias)</p>
                <h3 class="oracle-value" id="oracleValue">R$ 0,00</h3>
                <div class="oracle-trend" id="oracleTrend">
                   <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
                   <span>+0%</span>
                </div>
                <div class="ai-insight">
                  <div class="ai-insight-icon">✨</div>
                  <p class="ai-insight-text">Alta probabilidade de conversão baseada nos últimos 150 leads originados do Instagram.</p>
                </div>
              </div>
            </div>

            <!-- Recent Activity Feed -->
            <div class="glass-card activity-card animate-fade-in-up" style="animation-delay: 0.3s">
              <div class="card-header">
                <h2 class="card-title">Atividades Recentes</h2>
              </div>
              <div class="activity-feed" id="activityFeed">
                <!-- Activities will be injected here via JS -->
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="js/data.js"></script>
  <script src="js/ai-engine.js"></script>
  <script src="js/brand-config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/dashboard.js"></script>
  <script>document.addEventListener('DOMContentLoaded', () => { initNexaData().then(() => { NexaApp.init(); renderKPIs(); initNeuralMap(); initRevenueOracle(); renderActivityFeed(); }); });</script>
</body>
</html>
